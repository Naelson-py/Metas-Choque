<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Painel de Metas</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: #121212; color: #f0f0f0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    header { margin-bottom: 30px; text-align: center; }
    header h1 { color: #e50914; }
    .container { width: 100%; max-width: 600px; background-color: #1e1e1e; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); margin-bottom: 20px; }
    
    /* Upload de Imagem */
    .image-section { text-align: center; }
    .image-preview { width: 100%; height: 250px; background-color: #2c2c2c; border-radius: 8px; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; overflow: hidden; border: 2px dashed #444; }
    .image-preview img { width: 100%; height: 100%; object-fit: cover; display: none; }
    .file-input-label { background-color: #333; padding: 10px 20px; border-radius: 5px; cursor: pointer; transition: 0.3s; font-weight: bold; }
    .file-input-label:hover { background-color: #444; }
    input[type="file"] { display: none; }

    /* Metas */
    .input-group { display: flex; gap: 10px; margin-bottom: 20px; margin-top: 15px; }
    input[type="text"] { flex: 1; padding: 12px; border: none; border-radius: 5px; background-color: #333; color: white; outline: none; }
    button { background-color: #e50914; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
    button:hover { background-color: #b20710; }
    
    ul { list-style: none; }
    li { background-color: #333; padding: 15px; border-radius: 5px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .delete-btn { background-color: transparent; color: #ff4d4d; padding: 5px; border: 1px solid #ff4d4d; }
    .delete-btn:hover { background-color: #ff4d4d; color: white; }
  </style>
</head>
<body>

  <header>
    <h1>Painel de Controle</h1>
    <p>Minhas imagens e metas pessoais</p>
  </header>

  <!-- Seção da Imagem -->
  <div class="container image-section">
    <div class="image-preview" id="imagePreviewContainer">
      <span id="placeholderText">Nenhuma imagem carregada</span>
      <img id="previewImage" src="" alt="Imagem de Destaque">
    </div>
    <label class="file-input-label" for="imageInput">Escolher Imagem</label>
    <input type="file" id="imageInput" accept="image/*">
  </div>

  <!-- Seção das Metas -->
  <div class="container">
    <h2>Minhas Metas</h2>
    <div class="input-group">
      <input type="text" id="goalInput" placeholder="Ex: Finalizar a montagem do motor Fivetech...">
      <button onclick="addGoal()">Adicionar</button>
    </div>
    <ul id="goalList"></ul>
  </div>

  <script>
    // --- Lógica das Metas ---
    let goals = JSON.parse(localStorage.getItem('myGoals')) || [];
    const goalList = document.getElementById('goalList');
    const goalInput = document.getElementById('goalInput');

    function renderGoals() {
      goalList.innerHTML = '';
      goals.forEach((goal, index) => {
        const li = document.createElement('li');
        li.innerHTML = `
          <span>${goal}</span>
          <button class="delete-btn" onclick="removeGoal(${index})">X</button>
        `;
        goalList.appendChild(li);
      });
    }

    function addGoal() {
      const newGoal = goalInput.value.trim();
      if (newGoal !== '') {
        goals.push(newGoal);
        localStorage.setItem('myGoals', JSON.stringify(goals));
        goalInput.value = '';
        renderGoals();
      }
    }

    function removeGoal(index) {
      goals.splice(index, 1);
      localStorage.setItem('myGoals', JSON.stringify(goals));
      renderGoals();
    }

    // --- Lógica da Imagem ---
    const imageInput = document.getElementById('imageInput');
    const previewImage = document.getElementById('previewImage');
    const placeholderText = document.getElementById('placeholderText');

    // Carrega a imagem salva ao abrir a página
    const savedImage = localStorage.getItem('mySavedImage');
    if (savedImage) {
      previewImage.src = savedImage;
      previewImage.style.display = 'block';
      placeholderText.style.display = 'none';
    }

    imageInput.addEventListener('change', function(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const imageDataUrl = e.target.result;
          previewImage.src = imageDataUrl;
          previewImage.style.display = 'block';
          placeholderText.style.display = 'none';
          
          // Salva a imagem no navegador (Nota: imagens muito pesadas podem não salvar por limite de espaço)
          try {
            localStorage.setItem('mySavedImage', imageDataUrl);
          } catch (error) {
            alert('A imagem é muito grande para ser salva no armazenamento local.');
          }
        };
        reader.readAsDataURL(file);
      }
    });

    // Inicia a lista de metas
    renderGoals();
  </script>
</body>
</html>
