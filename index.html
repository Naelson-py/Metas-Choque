<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batalhão Choque 1BTL - Painel</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- CONEXÃO COM O FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --card-bg: #1c1e24;
            --primary-red: #d92525;
            --text-main: #ffffff;
            --text-muted: #8b92a5;
            --accent-yellow: #f8c545;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            color: var(--text-main); font-family: 'Roboto', sans-serif;
            display: flex; flex-direction: column; align-items: center; 
            padding-bottom: 50px; min-height: 100vh; background-color: #050505; overflow-x: hidden;
        }

        #bgCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; filter: blur(25px); transform: scale(1.1); }
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 30px 30px; z-index: -1; pointer-events: none;
        }

        .container { width: 100%; max-width: 900px; padding: 20px; }
        header { text-align: center; margin-bottom: 30px; padding-top: 20px; }
        
        @keyframes radarPulse {
            0% { box-shadow: 0 0 0 0 rgba(217, 37, 37, 0.8), 0 0 20px rgba(0,0,0,0.8); }
            70% { box-shadow: 0 0 0 20px rgba(217, 37, 37, 0), 0 0 20px rgba(0,0,0,0.8); }
            100% { box-shadow: 0 0 0 0 rgba(217, 37, 37, 0), 0 0 20px rgba(0,0,0,0.8); }
        }

        .logo-container { 
            width: 100px; height: 100px; margin: 0 auto 15px auto; border-radius: 50%; 
            background: url('https://scontent.faju21-1.fna.fbcdn.net/v/t39.30808-1/272909814_4717619788351034_6969902351451184948_n.jpg?stp=dst-jpg_tt6&cstp=mx698x698&ctp=s200x200&_nc_cat=105&ccb=1-7&_nc_sid=2d3e12&_nc_eui2=AeFS2qerkmq5-9JnXnYRoofXTY8DR0wSmKxNjwNHTBKYrP6AF-Er1x6RkHMDY6TkmxdLHl1V_gdEPvsZVT4q5WWK&_nc_ohc=pt-ZW675HLcQ7kNvwHBxgGG&_nc_oc=Adq7eEqAKWTfdSe-Qtm02NA2ABVFIVbRLuSZzAS8zuxz9Vkd7Dkgbh54Vyf_6BdD-2VJiOm4pRTmyGpm57tqsQ0H&_nc_zt=24&_nc_ht=scontent.faju21-1.fna&_nc_gid=sZgUXV4CggNNaIjov7XFKA&_nc_ss=7b2a8&oh=00_AQDnkINqtn8j6tq-7NDMKl8DSI85Fqw3PRKZHKt9kd42Mw&oe=6A66177F') center/cover; 
            border: 2px solid #333; animation: radarPulse 2s infinite; cursor: pointer;
        }

        h1 { font-family: 'Oswald', sans-serif; font-size: 28px; letter-spacing: 1px; margin-bottom: 5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .subtitle { color: var(--text-muted); font-size: 12px; letter-spacing: 2px; margin-bottom: 15px; text-transform: uppercase; }
        .tag-efetivo { display: inline-block; border: 1px solid var(--accent-yellow); color: var(--accent-yellow); padding: 5px 15px; border-radius: 20px; font-size: 14px; margin-bottom: 15px; background-color: rgba(0,0,0,0.5); }
        .status-online { font-family: 'Oswald', sans-serif; color: #00ff88; font-size: 14px; letter-spacing: 2px; display: flex; align-items: center; justify-content: center; gap: 8px; text-shadow: 1px 1px 2px #000; }
        .status-dot { width: 8px; height: 8px; background-color: #00ff88; border-radius: 50%; box-shadow: 0 0 10px #00ff88; }
        .divider { height: 2px; background-color: var(--primary-red); width: 100%; margin: 20px 0; border-radius: 2px; }

        .section-title { font-family: 'Oswald', sans-serif; font-size: 22px; letter-spacing: 1px; margin: 30px 0 15px 0; border-left: 4px solid var(--primary-red); padding-left: 10px; text-shadow: 1px 1px 2px #000; }
        
        .metas-wrapper { display: flex; flex-direction: column; gap: 15px; }
        .card { background-color: rgba(28, 30, 36, 0.85); backdrop-filter: blur(5px); border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.05); }

        @media (min-width: 768px) {
            .metas-wrapper { flex-direction: row; justify-content: space-between; }
            .metas-wrapper .card { flex: 1; } 
            #printsContainer { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
            .print-card { margin-bottom: 0 !important; }
        }

        .goal-header { display: flex; align-items: center; gap: 10px; font-weight: 500; margin-bottom: 15px; font-size: 15px; }
        .goal-numbers { font-family: 'Oswald', sans-serif; font-size: 18px; color: var(--text-muted); margin-bottom: 10px; }
        
        .current-num, .meta-num { font-size: 30px; color: var(--text-main); font-weight: 700; transition: 0.2s; cursor: default; }
        .admin-mode .current-num:hover, .admin-mode .meta-num:hover { color: var(--accent-yellow); cursor: pointer; }
        .meta-num { font-size: 22px; color: #888; }
        
        .progress-track { width: 100%; height: 8px; background-color: rgba(0,0,0,0.6); border-radius: 5px; overflow: hidden; box-shadow: inset 0 1px 3px rgba(0,0,0,0.8); }
        .goal-percent { text-align: right; font-family: 'Oswald', sans-serif; font-size: 16px; margin-top: 8px; font-weight: bold; transition: 0.3s; }

        .progress-fill { height: 100%; border-radius: 5px; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s; }
        .bar-red { background: linear-gradient(90deg, #660000, #ff3333, #660000); box-shadow: 0 0 12px rgba(255, 51, 51, 0.5); }
        .text-red { color: #ff3333; text-shadow: 0 0 5px rgba(255, 51, 51, 0.4); }
        .bar-yellow { background: linear-gradient(90deg, #806600, #ffcc00, #806600); box-shadow: 0 0 12px rgba(255, 204, 0, 0.5); }
        .text-yellow { color: #ffcc00; text-shadow: 0 0 5px rgba(255, 204, 0, 0.4); }
        .bar-green { background: linear-gradient(90deg, #004d00, #00e600, #004d00); box-shadow: 0 0 12px rgba(0, 230, 0, 0.5); }
        .text-green { color: #00e600; text-shadow: 0 0 5px rgba(0, 230, 0, 0.4); }
        
        @keyframes fireGlow {
            0% { background-position: 0% 50%; box-shadow: 0 0 15px #00e600, 0 0 5px #00ff88 inset; }
            50% { background-position: 100% 50%; box-shadow: 0 0 25px #00ff00, 0 0 10px #ffffff inset; }
            100% { background-position: 0% 50%; box-shadow: 0 0 15px #00e600, 0 0 5px #00ff88 inset; }
        }
        .bar-gold-flames { background: linear-gradient(90deg, #004d00, #00ff88, #00e600, #ccffcc, #004d00); background-size: 300% 300%; animation: fireGlow 0.5s ease-in-out infinite; border: 1px solid rgba(255, 255, 255, 0.4); }
        .text-gold-flames { color: #00ff88; text-shadow: 0 0 10px #00e600; font-size: 18px; }

        .area-restrita { display: none; }
        .admin-mode .area-restrita { display: block; }

        .upload-box { background-color: rgba(28, 30, 36, 0.85); backdrop-filter: blur(5px); border: 1px dashed var(--primary-red); padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center; }
        .upload-box input[type="file"] { display: none; }
        .upload-label { background-color: #333; color: white; padding: 10px 15px; border-radius: 5px; cursor: pointer; display: inline-block; margin-bottom: 10px; font-size: 14px; transition: 0.3s; border: 1px solid #555; }
        .upload-label:hover { background-color: #444; }
        
        .upload-box select, .upload-box input[type="text"] { width: 100%; padding: 12px; margin-bottom: 15px; background-color: rgba(0,0,0,0.6); border: 1px solid #333; color: white; border-radius: 5px; outline: none; }
        .upload-box select:focus, .upload-box input[type="text"]:focus { border-color: var(--primary-red); }
        .upload-box button { background-color: var(--primary-red); color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
        .upload-box button:hover { background-color: #b20710; }
        
        /* Pré-visualizações de imagens */
        .preview-container { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; flex-wrap: wrap; }
        .preview-box { display: none; flex: 1; min-width: 120px; text-align: center; }
        .preview-box img { width: 100%; max-height: 120px; object-fit: cover; border-radius: 5px; border: 1px solid #444; }
        .preview-box span { font-size: 12px; color: var(--accent-yellow); font-weight: bold; display: block; margin-top: 3px; }

        .filters { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .filters::-webkit-scrollbar { display: none; }
        .filter-btn { background-color: rgba(0,0,0,0.6); border: 1px solid #444; color: var(--text-muted); padding: 8px 16px; border-radius: 20px; font-size: 14px; cursor: pointer; white-space: nowrap; transition: 0.3s; backdrop-filter: blur(5px); }
        .filter-btn.active { background-color: var(--primary-red); color: white; border-color: var(--primary-red); box-shadow: 0 0 10px rgba(217, 37, 37, 0.4); }
        
        .print-card { background-color: rgba(28, 30, 36, 0.85); backdrop-filter: blur(5px); border-radius: 12px; overflow: hidden; margin-bottom: 20px; position: relative; border: 1px solid rgba(255,255,255,0.05); }
        
        /* Estilo para exibir 1 ou 2 imagens no card */
        .print-images-single { width: 100%; height: 180px; object-fit: cover; border-bottom: 1px solid #333; }
        .print-images-dual { display: flex; border-bottom: 1px solid #333; }
        .print-images-dual div { flex: 1; position: relative; }
        .print-images-dual img { width: 100%; height: 160px; object-fit: cover; display: block; }
        .img-badge { position: absolute; bottom: 5px; left: 5px; background: rgba(0,0,0,0.8); color: var(--accent-yellow); font-size: 11px; padding: 2px 6px; border-radius: 3px; font-weight: bold; border: 1px solid rgba(255,255,255,0.2); }

        .print-info { padding: 15px; }
        .print-tag { color: var(--accent-yellow); font-weight: bold; font-size: 14px; margin-bottom: 5px; }
        .print-date { color: var(--text-muted); font-size: 12px; margin-bottom: 10px; }
        .print-desc { font-size: 14px; line-height: 1.4; }
        
        .delete-print { display: none; position: absolute; top: 10px; right: 10px; background-color: rgba(0,0,0,0.8); color: #ff4d4d; border: 1px solid #ff4d4d; border-radius: 5px; padding: 5px 10px; cursor: pointer; font-weight: bold; z-index: 10; }
        .admin-mode .delete-print { display: block; }

    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="container">
    <header>
        <div class="logo-container" id="btnAdmin" title="Dê um duplo clique para logar como Admin"></div>
        <h1>BATALHÃO CHOQUE 1BTL</h1>
        <div class="subtitle">Painel de Metas Individuais</div>
        <div class="tag-efetivo">Efetivo: [TJF]ReSTo.Bdo[1BTL]</div>
        <div class="status-online"><div class="status-dot"></div> <span id="statusTxt">CONECTANDO A NUVEM...</span></div>
    </header>

    <div class="divider"></div>

    <div class="section-title">METAS ATIVAS</div>
    <div class="metas-wrapper">
        <div class="card">
            <div class="goal-header">🎯 Abates de Traficantes</div>
            <div class="goal-numbers">
                <span class="current-num" onclick="alterarMeta('abatesAtual')" id="abatesAtual">0</span> / 
                <span class="meta-num" onclick="alterarMeta('abatesMeta')" id="abatesMeta">15</span>
            </div>
            <div class="progress-track"><div class="progress-fill" id="abatesFill" style="width: 0%;"></div></div>
            <div class="goal-percent" id="abatesPct">0%</div>
        </div>

        <div class="card">
            <div class="goal-header">🚓 Prisões</div>
            <div class="goal-numbers">
                <span class="current-num" onclick="alterarMeta('prisoesAtual')" id="prisoesAtual">0</span> / 
                <span class="meta-num" onclick="alterarMeta('prisoesMeta')" id="prisoesMeta">25</span>
            </div>
            <div class="progress-track"><div class="progress-fill" id="prisoesFill" style="width: 0%;"></div></div>
            <div class="goal-percent" id="prisoesPct">0%</div>
        </div>

        <div class="card">
            <div class="goal-header">🏋️ Treinos</div>
            <div class="goal-numbers">
                <span class="current-num" onclick="alterarMeta('treinosAtual')" id="treinosAtual">0</span> / 
                <span class="meta-num" onclick="alterarMeta('treinosMeta')" id="treinosMeta">20</span>
            </div>
            <div class="progress-track"><div class="progress-fill" id="treinosFill" style="width: 0%;"></div></div>
            <div class="goal-percent" id="treinosPct">0%</div>
        </div>
    </div>

    <!-- AREA RESTRITA A ADMIN (Upload direto pela Home) -->
    <div class="area-restrita">
        <div class="section-title">REGISTRAR ATIVIDADE</div>
        <div class="upload-box">
            
            <select id="printTag" onchange="verificarTipoTag()">
                <option value="Info">📊 Info (Antes e Depois)</option>
                <option value="Treinos">🏋️ Treinos</option>
                <option value="Operação/Blitz">🚓 Operação/Blitz</option>
            </select>

            <!-- Pré-visualizações das imagens carregadas -->
            <div class="preview-container">
                <div class="preview-box" id="boxPrev1">
                    <img id="previewUpload1" src="" alt="Prev 1">
                    <span id="labelPrev1">Imagem</span>
                </div>
                <div class="preview-box" id="boxPrev2">
                    <img id="previewUpload2" src="" alt="Prev 2">
                    <span>DEPOIS</span>
                </div>
            </div>

            <!-- Botões de seleção de arquivo -->
            <div id="inputsUploadArea">
                <label class="upload-label" for="printInput1" id="labelBtn1">📷 Escolher Print (Antes)</label>
                <input type="file" id="printInput1" accept="image/*">

                <div id="segundoArquivoDiv" style="display: block;">
                    <label class="upload-label" for="printInput2">📷 Escolher Print (Depois)</label>
                    <input type="file" id="printInput2" accept="image/*">
                </div>
            </div>
            
            <input type="text" id="printDesc" placeholder="Descreva a atividade...">
            <button onclick="salvarPrint()">PUBLICAR REGISTRO NA NUVEM</button>
        </div>
    </div>

    <div class="section-title">MEUS REGISTROS</div>
    <div class="filters" id="filterContainer">
        <button class="filter-btn active" onclick="aplicarFiltro('Todos', this)">Todos</button>
        <button class="filter-btn" onclick="aplicarFiltro('Treinos', this)">Treinos</button>
        <button class="filter-btn" onclick="aplicarFiltro('Operação/Blitz', this)">Operação/Blitz</button>
        <button class="filter-btn" onclick="aplicarFiltro('Info', this)">Info</button>
    </div>

    <div id="printsContainer"></div>
</div>

<script>
    /* ==========================================================
        🚨 COLOQUE SUA CONFIGURAÇÃO DO FIREBASE AQUI 🚨 
       ========================================================== */
    const firebaseConfig = {
        apiKey: "AIzaSyB800XdKigaSyTeJeU9huM6MtQc6VZRhM8",
        authDomain: "painel-choque-1btl.firebaseapp.com",
        projectId: "painel-choque-1btl",
        storageBucket: "painel-choque-1btl.firebasestorage.app",
        messagingSenderId: "1093270718871",
        appId: "1:1093270718871:web:99f2f9c50a78356a419cd2"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    document.getElementById("statusTxt").innerText = "SISTEMA ONLINE (NUVEM)";

    /* SISTEMA ADMIN */
    let isAdmin = false;
    const SENHA_ADMIN = "99513489"; 

    document.getElementById('btnAdmin').addEventListener('dblclick', function() {
        if (!isAdmin) {
            let senha = prompt("Acesso Restrito. Digite a senha do Painel:");
            if (senha === SENHA_ADMIN) {
                isAdmin = true;
                document.body.classList.add('admin-mode');
                alert("ACESSO LIBERADO: Bem-vindo Administrador!");
            } else if(senha) {
                alert("Senha Incorreta!");
            }
        } else {
            isAdmin = false;
            document.body.classList.remove('admin-mode');
            alert("Desconectado do modo Administrador.");
        }
    });

    /* LÓGICA DAS METAS */
    function renderizarMeta(idBase, atual, meta) {
        document.getElementById(idBase + 'Atual').innerText = atual;
        document.getElementById(idBase + 'Meta').innerText = meta;
        
        let porcentagem = meta > 0 ? (atual / meta) * 100 : 0;
        let pText = document.getElementById(idBase + 'Pct');
        let bar = document.getElementById(idBase + 'Fill');
        
        pText.innerText = porcentagem.toFixed(0) + '%';
        let tamanhoBarra = porcentagem > 100 ? 100 : porcentagem;
        bar.style.width = tamanhoBarra + '%';
        bar.className = 'progress-fill'; pText.className = 'goal-percent'; 
        
        if (porcentagem < 20) { bar.classList.add('bar-red'); pText.classList.add('text-red'); } 
        else if (porcentagem < 50) { bar.classList.add('bar-yellow'); pText.classList.add('text-yellow'); } 
        else if (porcentagem < 100) { bar.classList.add('bar-green'); pText.classList.add('text-green'); } 
        else { bar.classList.add('bar-gold-flames'); pText.classList.add('text-gold-flames'); }
    }

    db.collection("painel").doc("metas").onSnapshot((doc) => {
        if (doc.exists) {
            let dados = doc.data();
            renderizarMeta('abates', dados.abatesAtual || 0, dados.abatesMeta || 15);
            renderizarMeta('prisoes', dados.prisoesAtual || 0, dados.prisoesMeta || 25);
            renderizarMeta('treinos', dados.treinosAtual || 0, dados.treinosMeta || 20);
        } else {
            db.collection("painel").doc("metas").set({
                abatesAtual: 0, abatesMeta: 15, prisoesAtual: 0, prisoesMeta: 25, treinosAtual: 0, treinosMeta: 20
            });
        }
    });

    function alterarMeta(campo) {
        if (!isAdmin) return; 
        let el = document.getElementById(campo);
        let valor = prompt("Digite o novo valor:", el.innerText);
        
        if (valor !== null && !isNaN(valor) && valor.trim() !== "") {
            db.collection("painel").doc("metas").update({
                [campo]: parseFloat(valor)
            });
        }
    }

    /* =========================================
       COMPORTAMENTO DINÂMICO DE UPLOAD (INFO = 2 IMAGENS)
       ========================================= */
    let base64Image1 = "";
    let base64Image2 = "";

    function verificarTipoTag() {
        const tagValor = document.getElementById('printTag').value;
        const segundoDiv = document.getElementById('segundoArquivoDiv');
        const labelBtn1 = document.getElementById('labelBtn1');

        if (tagValor === "Info") {
            segundoDiv.style.display = "block";
            labelBtn1.innerText = "📷 Escolher Print (Antes)";
        } else {
            segundoDiv.style.display = "none";
            labelBtn1.innerText = "📷 Escolher Print";
            base64Image2 = ""; 
            document.getElementById('boxPrev2').style.display = "none";
        }
    }

    // Função para comprimir a imagem antes de enviar à nuvem (evita estourar o limite do Firestore)
    function comprimirImagem(file, callback) {
        const reader = new FileReader();
        reader.onload = function(event) {
            let img = new Image();
            img.src = event.target.result;
            img.onload = function() {
                let cvs = document.createElement('canvas');
                let max_width = 800; 
                let scale = max_width / img.width;
                cvs.width = max_width;
                cvs.height = img.height * scale;
                let ctxCvs = cvs.getContext('2d');
                ctxCvs.drawImage(img, 0, 0, cvs.width, cvs.height);
                callback(cvs.toDataURL('image/jpeg', 0.7));
            }
        };
        reader.readAsDataURL(file);
    }

    const printInput1 = document.getElementById('printInput1');
    const printInput2 = document.getElementById('printInput2');

    printInput1.addEventListener('change', function(e) {
        if (e.target.files[0]) {
            comprimirImagem(e.target.files[0], function(resultado) {
                base64Image1 = resultado;
                document.getElementById('previewUpload1').src = base64Image1;
                document.getElementById('boxPrev1').style.display = "block";
                document.getElementById('labelPrev1').innerText = document.getElementById('printTag').value === "Info" ? "ANTES" : "Imagem";
            });
        }
    });

    printInput2.addEventListener('change', function(e) {
        if (e.target.files[0]) {
            comprimirImagem(e.target.files[0], function(resultado) {
                base64Image2 = resultado;
                document.getElementById('previewUpload2').src = base64Image2;
                document.getElementById('boxPrev2').style.display = "block";
            });
        }
    });

    function salvarPrint() {
        if (!isAdmin) return;
        const tagSelect = document.getElementById('printTag');
        const tagOpcao = tagSelect.options[tagSelect.selectedIndex].text;
        const tagFiltro = tagSelect.value; 
        const desc = document.getElementById('printDesc').value.trim();
        const dataAtual = new Date().toLocaleDateString('pt-BR');

        if (!base64Image1) { alert("Selecione pelo menos a primeira imagem!"); return; }
        if (tagFiltro === "Info" && !base64Image2) { alert("Para a categoria Info, você precisa anexar a segunda imagem (Depois)!"); return; }
        if (!desc) { alert("Digite uma descrição!"); return; }

        document.getElementById('statusTxt').innerText = "ENVIANDO PARA NUVEM...";

        db.collection("prints").add({
            img: base64Image1,
            img2: tagFiltro === "Info" ? base64Image2 : null, 
            tagRender: tagOpcao,
            tagFiltro: tagFiltro,
            data: dataAtual,
            desc: desc,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => {
            document.getElementById('printDesc').value = '';
            document.getElementById('previewUpload1').src = ''; document.getElementById('boxPrev1').style.display = 'none';
            document.getElementById('previewUpload2').src = ''; document.getElementById('boxPrev2').style.display = 'none';
            base64Image1 = ""; base64Image2 = "";
            printInput1.value = ''; printInput2.value = '';
            document.getElementById('statusTxt').innerText = "SISTEMA ONLINE (NUVEM)";
            alert("Registro publicado com sucesso na nuvem para todos os visitantes!");
        }).catch(err => {
            alert("Erro ao salvar! Imagem muito grande.");
            document.getElementById('statusTxt').innerText = "SISTEMA ONLINE (NUVEM)";
        });
    }

    let filtroAtual = "Todos";
    let meusPrints = [];

    db.collection("prints").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
        meusPrints = [];
        snapshot.forEach((doc) => {
            meusPrints.push({ id: doc.id, ...doc.data() });
        });
        carregarPrints();
    });

    function aplicarFiltro(categoria, botaoClicado) {
        filtroAtual = categoria;
        const botoes = document.querySelectorAll('.filter-btn');
        botoes.forEach(btn => btn.classList.remove('active'));
        botaoClicado.classList.add('active');
        carregarPrints();
    }

    function carregarPrints() {
        const container = document.getElementById('printsContainer');
        container.innerHTML = '';
        
        meusPrints.forEach((print) => {
            if (filtroAtual === "Todos" || print.tagFiltro === filtroAtual) {
                const card = document.createElement('div');
                card.className = 'print-card';
                
                let conteudoImagens = "";
                if (print.img2) {
                    conteudoImagens = `
                        <div class="print-images-dual">
                            <div>
                                <img src="${print.img}" alt="Antes">
                                <span class="img-badge">ANTES</span>
                            </div>
                            <div>
                                <img src="${print.img2}" alt="Depois">
                                <span class="img-badge">DEPOIS</span>
                            </div>
                        </div>
                    `;
                } else {
                    conteudoImagens = `<img src="${print.img}" alt="Registro" class="print-images-single">`;
                }

                card.innerHTML = `
                    <button class="delete-print" onclick="apagarPrint('${print.id}')" title="Apagar post">X</button>
                    ${conteudoImagens}
                    <div class="print-info">
                        <div class="print-tag">${print.tagRender}</div>
                        <div class="print-date">${print.data}</div>
                        <div class="print-desc">${print.desc}</div>
                    </div>
                `;
                container.appendChild(card);
            }
        });
    }

    function apagarPrint(idDoc) {
        if (!isAdmin) return;
        if (confirm("Apagar este registro da nuvem para sempre?")) {
            db.collection("prints").doc(idDoc).delete();
        }
    }

    /* CAMUFLADO CANVAS DE FUNDO */
    const canvas = document.getElementById("bgCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let patchesArray = [];
    const camoColors = ['#080808', '#1a1a1a', '#2b2b2b', '#121413'];

    class CamoPatch {
        constructor() {
            this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
            this.rx = Math.random() * 200 + 100; this.ry = Math.random() * 150 + 80;
            this.angle = Math.random() * Math.PI * 2; this.speed = Math.random() * 0.2 + 0.05;
            this.vx = Math.cos(this.angle) * this.speed; this.vy = Math.sin(this.angle) * this.speed;
            this.color = camoColors[Math.floor(Math.random() * camoColors.length)];
            this.rotationSpeed = (Math.random() - 0.5) * 0.002;
        }
        update() {
            this.x += this.vx; this.y += this.vy; this.angle += this.rotationSpeed;
            if (this.x < -this.rx) this.x = canvas.width + this.rx;
            if (this.x > canvas.width + this.rx) this.x = -this.rx;
            if (this.y < -this.ry) this.y = canvas.height + this.ry;
            if (this.y > canvas.height + this.ry) this.y = -this.ry;
        }
        draw() { ctx.fillStyle = this.color; ctx.beginPath(); ctx.ellipse(this.x, this.y, this.rx, this.ry, this.angle, 0, Math.PI * 2); ctx.fill(); }
    }

    function initCamo() { patchesArray = []; let numPatches = Math.floor((canvas.width * canvas.height) / 30000); for (let i = 0; i < numPatches; i++) patchesArray.push(new CamoPatch()); }
    function animateCamo() { ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, canvas.width, canvas.height); for (let i = 0; i < patchesArray.length; i++) { patchesArray[i].update(); patchesArray[i].draw(); } requestAnimationFrame(animateCamo); }
    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; initCamo(); });
    initCamo(); animateCamo();
</script>

</body>
</html>
