<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Comando - 1º BTL</title>
  <style>
    /* Estilo Base Tático */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Impact', 'Arial Black', sans-serif; letter-spacing: 1px; }
    body { background-color: #0d0d0d; color: #d4d4d4; display: flex; flex-direction: column; align-items: center; padding: 20px; text-transform: uppercase; }
    
    header { margin-bottom: 30px; text-align: center; border-bottom: 2px solid #8b0000; padding-bottom: 15px; width: 100%; max-width: 700px; }
    header h1 { color: #ffffff; font-size: 2.5rem; text-shadow: 2px 2px 5px rgba(255, 0, 0, 0.5); }
    header p { color: #888; font-family: Arial, sans-serif; letter-spacing: 0; font-size: 0.9rem; margin-top: 5px; }

    .container { width: 100%; max-width: 700px; background-color: #1a1a1a; padding: 25px; border: 1px solid #333; border-left: 5px solid #8b0000; box-shadow: 0 5px 15px rgba(0,0,0,0.8); margin-bottom: 25px; }
    .container h2 { color: #fff; margin-bottom: 15px; font-size: 1.5rem; }

    /* Upload de Imagem (Brasão/Foto) */
    .image-section { text-align: center; }
    .image-preview { width: 100%; max-width: 200px; height: 200px; margin: 0 auto 15px auto; background-color: #0d0d0d; border: 2px solid #444; display: flex; justify-content: center; align-items: center; overflow: hidden; }
    .image-preview img { width: 100%; height: 100%; object-fit: cover; display: none; }
    .image-preview span { font-family: Arial, sans-serif; font-size: 0.8rem; color: #555; text-align: center; padding: 10px; }
    
    .file-input-label { background-color: #8b0000; color: white; padding: 10px 20px; cursor: pointer; transition: 0.3s; font-size: 0.9rem; display: inline-block; }
    .file-input-label:hover { background-color: #5a0000; }
    input[type="file"] { display: none; }

    /* Missões / Metas */
    .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
    input[type="text"] { flex: 1; padding: 15px; border: 1px solid #444; background-color: #0d0d0d; color: white; outline: none; font-family: Arial, sans-serif; letter-spacing: 0; }
    input[type="text"]:focus { border-color: #8b0000; }
    
    button { background-color: #333; color: white; border: 1px solid #555; padding: 12px 20px; cursor: pointer; transition: 0.3s; font-size: 1rem; }
    button:hover { background-color: #8b0000; border-color: #8b0000; }
    
    ul { list-style: none; padding: 0; }
    li { background-color: #222; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid #555; font-family: Arial, sans-serif; letter-spacing: 0; text-transform: none; }
    li:hover { border-left-color: #8b0000; background-color: #2a2a2a; }
    
    .delete-btn { background-color: transparent; color: #8b0000; border: none; font-weight: bold; font-size: 1.2rem; }
    .delete-btn:hover { background-color: transparent; color: #ff4d4d; }
  </style>
</head>
<body>

  <header>
    <h1>Batalhão de Choque - 1º BTL</h1>
    <p>Painel de Controle Tático e Diretrizes de Operação</p>
  </header>

  <!-- Brasão / Foto de Farda -->
  <div class="container image-section">
    <h2>Identificação Visual</h2>
    <div class="image-preview" id="imagePreviewContainer">
      <span id="placeholderText">Sem Brasão/Foto</span>
      <img id="previewImage" src="" alt="Identificação">
    </div>
    <label class="file-input-label" for="imageInput">Carregar Arquivo</label>
    <input type="file" id="imageInput" accept="image/*">
  </div>

  <!-- Missões (Metas) -->
  <div class="container">
    <h2>Quadro de Missões</h2>
    <div class="input-group">
      <input type="text" id="goalInput" placeholder="Ex: Farmar build da Acceltra / Revisar motor Fivetech do Marea sedan...">
      <button onclick="addGoal()">REGISTRAR</button>
    </div>
    <ul id="goalList"></ul>
  </div>

  <script>
    let goals = JSON.parse(localStorage.getItem('choqueGoals')) || [];
    const goalList = document.getElementById('goalList');
    const goalInput = document.getElementById('goalInput');

    function renderGoals() {
      goalList.innerHTML = '';
      goals.forEach((goal, index) => {
        const li = document.createElement('li');
        li.innerHTML = `
          <span>${goal}</span>
          <button class="delete-btn" onclick="removeGoal(${index})">X</button>
        `;
        goalList.appendChild(li);
      });
    }

    function addGoal() {
      const newGoal = goalInput.value.trim();
      if (newGoal !== '') {
        goals.push(newGoal);
        localStorage.setItem('choqueGoals', JSON.stringify(goals));
        goalInput.value = '';
        renderGoals();
      }
    }

    function removeGoal(index) {
      goals.splice(index, 1);
      localStorage.setItem('choqueGoals', JSON.stringify(goals));
      renderGoals();
    }

    const imageInput = document.getElementById('imageInput');
    const previewImage = document.getElementById('previewImage');
    const placeholderText = document.getElementById('placeholderText');

    const savedImage = localStorage.getItem('choqueImage');
    if (savedImage) {
      previewImage.src = savedImage;
      previewImage.style.display = 'block';
      placeholderText.style.display = 'none';
    }

    imageInput.addEventListener('change', function(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const imageDataUrl = e.target.result;
          previewImage.src = imageDataUrl;
          previewImage.style.display = 'block';
          placeholderText.style.display = 'none';
          
          try {
            localStorage.setItem('choqueImage', imageDataUrl);
          } catch (error) {
            alert('A imagem é muito pesada para salvar no cache local do navegador.');
          }
        };
        reader.readAsDataURL(file);
      }
    });

    renderGoals();
  </script>
</body>
</html>
