<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batalhão Choque 1BTL - Painel</title>
    <!-- Fontes do Google -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --card-bg: #1c1e24;
            --primary-red: #d92525;
            --primary-green: #00e600; /* Novo verde das metas */
            --text-main: #ffffff;
            --text-muted: #8b92a5;
            --accent-yellow: #f8c545;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* Fundo Animado com as Cores do Choque */
        body {
            color: var(--text-main); 
            font-family: 'Roboto', sans-serif;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-bottom: 50px;
            min-height: 100vh;
            
            /* Animação de cores escuras e vermelho Choque */
            background: linear-gradient(-45deg, #050505, #1c0505, #0a0a0a, #150000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        /* Overlay Quadriculado Fixo */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container { width: 100%; max-width: 500px; padding: 20px; }

        /* HEADER */
        header { text-align: center; margin-bottom: 30px; padding-top: 20px; }

        h1 { font-family: 'Oswald', sans-serif; font-size: 28px; letter-spacing: 1px; margin-bottom: 5px; }
        .subtitle { color: var(--text-muted); font-size: 12px; letter-spacing: 2px; margin-bottom: 15px; text-transform: uppercase; }
        .tag-efetivo { display: inline-block; border: 1px solid var(--accent-yellow); color: var(--accent-yellow); padding: 5px 15px; border-radius: 20px; font-size: 14px; margin-bottom: 15px; }
        .status-online { font-family: 'Oswald', sans-serif; color: #00ff88; font-size: 14px; letter-spacing: 2px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .status-dot { width: 8px; height: 8px; background-color: #00ff88; border-radius: 50%; box-shadow: 0 0 10px #00ff88; }
        .divider { height: 2px; background-color: var(--primary-red); width: 100%; margin: 20px 0; }

        /* METAS CARDS */
        .section-title { font-family: 'Oswald', sans-serif; font-size: 22px; letter-spacing: 1px; margin: 30px 0 15px 0; border-left: 4px solid var(--primary-red); padding-left: 10px; }
        .card { background-color: var(--card-bg); border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); }
        .goal-header { display: flex; align-items: center; gap: 10px; font-weight: 500; margin-bottom: 15px; font-size: 15px; }
        .goal-numbers { font-family: 'Oswald', sans-serif; font-size: 18px; color: var(--text-muted); margin-bottom: 10px; }
        .current-num, .meta-num { font-size: 30px; color: var(--text-main); font-weight: 700; cursor: pointer; transition: 0.2s; }
        .current-num:hover, .meta-num:hover { color: var(--accent-yellow); }
        .meta-num { font-size: 22px; color: #888; }
        
        .progress-track { width: 100%; height: 8px; background-color: #2a2d35; border-radius: 5px; overflow: hidden; }
        
        /* Barra Verde Animada */
        .progress-fill { 
            height: 100%; 
            background: linear-gradient(90deg, #004d00, var(--primary-green), #004d00); 
            border-radius: 5px; 
            box-shadow: 0 0 12px rgba(0, 230, 0, 0.5); 
            transition: width 0.5s ease-in-out; 
        }
        
        .goal-percent { text-align: right; color: var(--accent-yellow); font-family: 'Oswald', sans-serif; font-size: 16px; margin-top: 8px; }

        /* UPLOAD DE TREINOS */
        .upload-box { background-color: rgba(217, 37, 37, 0.05); border: 1px dashed var(--primary-red); padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center; }
        .upload-box input[type="file"] { display: none; }
        .upload-label { background-color: #333; color: white; padding: 10px 15px; border-radius: 5px; cursor: pointer; display: inline-block; margin-bottom: 15px; font-size: 14px; transition: 0.3s; }
        .upload-label:hover { background-color: #555; }
        .upload-box input[type="text"] { width: 100%; padding: 12px; margin-bottom: 15px; background-color: #111; border: 1px solid #333; color: white; border-radius: 5px; outline: none; }
        .upload-box input[type="text"]:focus { border-color: var(--primary-red); }
        .upload-box button { background-color: var(--primary-red); color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; letter-spacing: 1px; }
        .upload-box button:hover { background-color: #b20710; }
        #previewUpload { width: 100%; max-height: 150px; object-fit: cover; margin-bottom: 15px; border-radius: 5px; display: none; }

        /* REGISTROS / PRINTS */
        .print-card { background-color: var(--card-bg); border-radius: 12px; overflow: hidden; margin-bottom: 20px; position: relative; }
        .print-img { width: 100%; height: 180px; object-fit: cover; border-bottom: 1px solid #333; }
        .print-info { padding: 15px; }
        .print-tag { color: var(--accent-yellow); font-weight: bold; font-size: 14px; margin-bottom: 5px; }
        .print-date { color: var(--text-muted); font-size: 12px; margin-bottom: 10px; }
        .print-desc { font-size: 14px; line-height: 1.4; }
        .delete-print { position: absolute; top: 10px; right: 10px; background-color: rgba(0,0,0,0.7); color: #ff4d4d; border: 1px solid #ff4d4d; border-radius: 5px; padding: 5px 10px; cursor: pointer; font-weight: bold; }
    </style>

        <div class="goal-header">🚓 Prisões</div>
        <div class="goal-numbers">
            <span class="current-num" id="prisoesAtual">0</span> / <span class="meta-num" id="prisoesMeta">25</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="prisoesFill" style="width: 0%;"></div></div>
        <div class="goal-percent" id="prisoesPct">0%</div>
    </div>

    <div class="card">
        <div class="goal-header">🏋️ Treinos</div>
        <div class="goal-numbers">
            <span class="current-num" id="treinosAtual">0</span> / <span class="meta-num" id="treinosMeta">20</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="treinosFill" style="width: 0%;"></div></div>
        <div class="goal-percent" id="treinosPct">0%</div>
    </div>

    <!-- CAIXA DE UPLOAD -->
    <div class="section-title">REGISTRAR TREINO / OPERAÇÃO</div>
    <div class="upload-box">
        <img id="previewUpload" src="" alt="Pré-visualização">
        <label class="upload-label" for="printInput">📷 Escolher Print</label>
        <input type="file" id="printInput" accept="image/*">
        
        <input type="text" id="printTag" placeholder="Tag (Ex: 🏋️ Treinos, 🚓 Blitz)">
        <input type="text" id="printDesc" placeholder="Descreva a atividade...">
        <button onclick="salvarPrint()">PUBLICAR REGISTRO</button>
    </div>

    <!-- LISTA DE REGISTROS -->
    <div class="section-title">MEUS REGISTROS</div>
    <div id="printsContainer">
        <!-- Os prints salvos aparecerão aqui -->
    </div>
</div>

<script>
    /* LÓGICA DAS METAS (Cálculo Automático) */
    function calcularPorcentagem(idBase) {
        let atual = parseFloat(localStorage.getItem(idBase + 'Atual')) || parseFloat(document.getElementById(idBase + 'Atual').innerText) || 0;
        let meta = parseFloat(localStorage.getItem(idBase + 'Meta')) || parseFloat(document.getElementById(idBase + 'Meta').innerText) || 1;
        
        let porcentagem = (atual / meta) * 100;
        
        document.getElementById(idBase + 'Atual').innerText = atual;
        document.getElementById(idBase + 'Meta').innerText = meta;
        document.getElementById(idBase + 'Pct').innerText = porcentagem.toFixed(0) + '%';
        
        let tamanhoBarra = porcentagem > 100 ? 100 : porcentagem;
        document.getElementById(idBase + 'Fill').style.width = tamanhoBarra + '%';
    }

    ['abates', 'prisoes', 'treinos'].forEach(idBase => {
        ['Atual', 'Meta'].forEach(tipo => {
            let elemento = document.getElementById(idBase + tipo);
            elemento.addEventListener('click', function() {
                let valor = prompt("Digite o novo valor (apenas números):", this.innerText);
                if (valor !== null && !isNaN(valor) && valor.trim() !== "") {
                    localStorage.setItem(this.id, valor);
                    calcularPorcentagem(idBase); 
                }
            });
        });
        calcularPorcentagem(idBase); 
    });

    /* LÓGICA DE UPLOAD DE PRINTS */
    const printInput = document.getElementById('printInput');
    const previewUpload = document.getElementById('previewUpload');
    let base64Image = "";

    printInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                base64Image = event.target.result;
                previewUpload.src = base64Image;
                previewUpload.style.display = "block";
            };
            reader.readAsDataURL(file);
        }
    });

    function salvarPrint() {
        const tag = document.getElementById('printTag').value.trim() || "📌 Info";
        const desc = document.getElementById('printDesc').value.trim();
        const dataAtual = new Date().toLocaleDateString('pt-BR');

        if (!base64Image) {
            alert("Por favor, selecione uma imagem primeiro!");
            return;
        }
        if (!desc) {
            alert("Por favor, digite uma descrição!");
            return;
        }

        let meusPrints = JSON.parse(localStorage.getItem('choquePrints')) || [];
        meusPrints.unshift({ img: base64Image, tag: tag, data: dataAtual, desc: desc });

        try {
            localStorage.setItem('choquePrints', JSON.stringify(meusPrints));
            document.getElementById('printTag').value = '';
            document.getElementById('printDesc').value = '';
            previewUpload.src = '';
            previewUpload.style.display = 'none';
            base64Image = '';
            printInput.value = '';
            carregarPrints();
        } catch (e) {
            alert("A imagem é muito pesada para salvar no armazenamento local. Tente um print cortado ou com menor resolução.");
        }
    }

    function carregarPrints() {
        const container = document.getElementById('printsContainer');
        container.innerHTML = '';
        let meusPrints = JSON.parse(localStorage.getItem('choquePrints')) || [];

        meusPrints.forEach((print, index) => {
            const card = document.createElement('div');
            card.className = 'print-card';
            card.innerHTML = `
                <button class="delete-print" onclick="apagarPrint(${index})">X</button>
                <img src="${print.img}" alt="Registro" class="print-img">
                <div class="print-info">
                    <div class="print-tag">${print.tag}</div>
                    <div class="print-date">${print.data}</div>
                    <div class="print-desc">${print.desc}</div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function apagarPrint(index) {
        if (confirm("Tem certeza que deseja apagar este registro?")) {
            let meusPrints = JSON.parse(localStorage.getItem('choquePrints')) || [];
            meusPrints.splice(index, 1);
            localStorage.setItem('choquePrints', JSON.stringify(meusPrints));
            carregarPrints();
        }
    }

    carregarPrints();
</script>

</body>
</html>
